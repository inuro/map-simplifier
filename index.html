<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>map-simplifier</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
      }
      #app {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        border-bottom: 1px solid #e0e0e0;
        background: #fff;
      }
      header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      header .spacer {
        flex: 1;
      }
      .selection-count {
        font-size: 12px;
        color: #666;
        min-width: 6em;
        text-align: right;
      }
      button.primary {
        appearance: none;
        border: 1px solid #888;
        background: #fff;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        border-radius: 4px;
      }
      button.primary:hover {
        background: #f3f3f3;
      }
      button.primary:disabled {
        opacity: 0.5;
        cursor: wait;
      }
      .preset-group {
        display: inline-flex;
        border: 1px solid #888;
        border-radius: 4px;
        overflow: hidden;
      }
      .preset-group button {
        appearance: none;
        border: 0;
        background: #fff;
        padding: 6px 10px;
        font-size: 13px;
        cursor: pointer;
      }
      .preset-group button + button {
        border-left: 1px solid #ccc;
      }
      .preset-group button:hover {
        background: #f3f3f3;
      }
      .preset-group button[aria-pressed="true"] {
        background: #333;
        color: #fff;
      }
      .preset-group button[aria-pressed="true"]:hover {
        background: #222;
      }
      #map {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>map-simplifier</h1>
        <span id="selection-count" class="selection-count" aria-live="polite"></span>
        <span class="spacer"></span>
        <div class="preset-group" role="group" aria-label="スタイルプリセット">
          <button id="preset-standard" type="button" aria-pressed="true">標準</button>
          <button id="preset-mono" type="button" aria-pressed="false">モノトーン</button>
        </div>
        <button id="reset-edits" class="primary" type="button" title="非表示にした要素を全て戻す" disabled>
          編集をリセット
        </button>
        <button id="export-png" class="primary" type="button">PNG書き出し</button>
      </header>
      <div id="map"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
