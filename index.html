<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>map-simplifier</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
      }
      #app {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
      }
      header {
        display: flex;
        align-items: center;
        flex-wrap: nowrap;
        gap: 12px;
        padding: 8px 12px;
        border-bottom: 1px solid #e0e0e0;
        background: #fff;
        position: relative;
        z-index: 20;
        overflow: visible;
      }
      header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.02em;
        display: inline-flex;
        align-items: baseline;
        gap: 6px;
      }
      header h1 .version {
        font-size: 11px;
        font-weight: 400;
        color: #888;
        font-variant-numeric: tabular-nums;
      }
      .coordinate-form {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }
      .coordinate-input {
        width: 160px;
        box-sizing: border-box;
        border: 1px solid #aaa;
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 13px;
        font-variant-numeric: tabular-nums;
      }
      .coordinate-input:focus {
        outline: 2px solid #8eb8ff;
        outline-offset: 1px;
      }
      .coordinate-input[aria-invalid="true"] {
        border-color: #b42318;
        background: #fff6f5;
      }
      .coordinate-status {
        font-size: 12px;
        color: #666;
        white-space: nowrap;
      }
      .coordinate-status[data-kind="error"] {
        color: #b42318;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      header .spacer {
        flex: 1;
      }
      .selection-count {
        font-size: 12px;
        color: #666;
        min-width: 6em;
        text-align: right;
      }
      .zoom-display {
        font-size: 12px;
        color: #666;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      .zoom-display[data-locked="true"] {
        color: #b42318;
        font-weight: 600;
      }
      button.primary {
        appearance: none;
        border: 1px solid #888;
        background: #fff;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        border-radius: 4px;
      }
      button.primary:hover {
        background: #f3f3f3;
      }
      button.primary:disabled {
        opacity: 0.5;
        cursor: wait;
      }
      .preset-group {
        display: inline-flex;
        border: 1px solid #888;
        border-radius: 4px;
        overflow: hidden;
      }
      .preset-group button {
        appearance: none;
        border: 0;
        background: #fff;
        padding: 6px 10px;
        font-size: 13px;
        cursor: pointer;
      }
      .preset-group button + button {
        border-left: 1px solid #ccc;
      }
      .preset-group button:hover {
        background: #f3f3f3;
      }
      .preset-group button[aria-pressed="true"] {
        background: #333;
        color: #fff;
      }
      .preset-group button[aria-pressed="true"]:hover {
        background: #222;
      }
      .edit-group {
        display: inline-flex;
        gap: 6px;
      }
      .layer-visibility-wrap {
        position: relative;
      }
      .layer-visibility-popover {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        background: #fff;
        border: 1px solid #bbb;
        border-radius: 6px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        padding: 10px 12px;
        z-index: 100;
        font-size: 13px;
        min-width: 300px;
      }
      .layer-visibility-popover[hidden] {
        display: none;
      }
      .layer-visibility-row {
        display: grid;
        grid-template-columns: minmax(8.5em, 1fr) auto;
        align-items: center;
        gap: 12px;
        padding: 5px 0;
        white-space: nowrap;
      }
      .layer-visibility-toggle-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .layer-visibility-row input {
        margin: 0;
      }
      .layer-width-control {
        display: inline-grid;
        grid-template-columns: 1.8em 3.4em 1.8em;
        align-items: center;
        gap: 6px;
      }
      .layer-width-control > .value {
        text-align: center;
        color: #666;
        font-variant-numeric: tabular-nums;
      }
      .layer-width-control button {
        appearance: none;
        border: 1px solid #aaa;
        background: #fff;
        border-radius: 4px;
        padding: 2px 0;
        cursor: pointer;
        font-size: 14px;
      }
      .layer-width-control button:hover {
        background: #f3f3f3;
      }
      .layer-width-control button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .layer-visibility-popover .reset {
        width: 100%;
        margin-top: 6px;
        padding: 4px 8px;
        border: 1px solid #aaa;
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      .layer-visibility-popover .reset:hover {
        background: #f3f3f3;
      }
      #map {
        width: 100%;
        height: 100%;
        position: relative;
        z-index: 0;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>map-simplifier<span id="app-version" class="version" aria-label="バージョン"></span></h1>
        <form id="goto-coordinate" class="coordinate-form" aria-label="緯度経度へ移動">
          <label class="sr-only" for="goto-coordinate-input">緯度経度</label>
          <input
            id="goto-coordinate-input"
            class="coordinate-input"
            type="text"
            inputmode="decimal"
            autocomplete="off"
            placeholder="35.681, 139.767"
            aria-describedby="goto-coordinate-status"
          />
          <button class="primary" type="submit">移動</button>
          <span id="goto-coordinate-status" class="coordinate-status" aria-live="polite"></span>
        </form>
        <span id="selection-count" class="selection-count" aria-live="polite"></span>
        <span class="spacer"></span>
        <span id="zoom-display" class="zoom-display" aria-live="polite" title="現在のズームレベル。編集中はロックされ、🔒 が表示される。">Z --</span>
        <div class="preset-group" role="group" aria-label="スタイルプリセット">
          <button id="preset-standard" type="button" aria-pressed="true">標準</button>
          <button id="preset-mono" type="button" aria-pressed="false">モノトーン</button>
        </div>
        <div class="edit-group" role="group" aria-label="編集アクション">
          <button id="undo" class="primary" type="button" title="戻す (⌘Z)" disabled>戻す</button>
          <button id="redo" class="primary" type="button" title="やり直す (⇧⌘Z)" disabled>やり直す</button>
          <button id="highlight" class="primary" type="button" title="選択中を強調／解除" disabled>強調</button>
          <button id="delete" class="primary" type="button" title="選択中を削除 (Delete)" disabled>削除</button>
          <button id="delete-inverse" class="primary" type="button" title="選択した feature の周囲（4倍領域）にある未選択要素を削除" disabled>選択以外を削除</button>
          <button id="reset-edits" class="primary" type="button" title="編集を全て破棄" disabled>
            編集をリセット
          </button>
        </div>
        <div class="layer-visibility-wrap">
          <button id="layer-visibility-toggle" class="primary" type="button" aria-expanded="false" aria-controls="layer-visibility-popover">レイヤ…</button>
          <div id="layer-visibility-popover" class="layer-visibility-popover" role="dialog" aria-label="レイヤ表示と太さの調整" hidden>
            <div class="layer-visibility-row">
              <label class="layer-visibility-toggle-label">
                <input type="checkbox" data-layer-visibility="water" checked />
                <span>水域</span>
              </label>
              <div class="layer-width-control" aria-label="水域の太さ">
                <button type="button" data-lw="water" data-op="dec" aria-label="水域を細く">−</button>
                <span class="value" data-lw-value="water">1.00×</span>
                <button type="button" data-lw="water" data-op="inc" aria-label="水域を太く">＋</button>
              </div>
            </div>
            <div class="layer-visibility-row">
              <label class="layer-visibility-toggle-label">
                <input type="checkbox" data-layer-visibility="road" checked />
                <span>道路中心線</span>
              </label>
              <div class="layer-width-control" aria-label="道路中心線の太さ">
                <button type="button" data-lw="road" data-op="dec" aria-label="道路中心線を細く">−</button>
                <span class="value" data-lw-value="road">1.00×</span>
                <button type="button" data-lw="road" data-op="inc" aria-label="道路中心線を太く">＋</button>
              </div>
            </div>
            <div class="layer-visibility-row">
              <label class="layer-visibility-toggle-label">
                <input type="checkbox" data-layer-visibility="roadEdge" checked />
                <span>道路枠線</span>
              </label>
              <div class="layer-width-control" aria-label="道路枠線の太さ">
                <button type="button" data-lw="roadEdge" data-op="dec" aria-label="道路枠線を細く">−</button>
                <span class="value" data-lw-value="roadEdge">1.00×</span>
                <button type="button" data-lw="roadEdge" data-op="inc" aria-label="道路枠線を太く">＋</button>
              </div>
            </div>
            <div class="layer-visibility-row">
              <label class="layer-visibility-toggle-label">
                <input type="checkbox" data-layer-visibility="railway" checked />
                <span>鉄道</span>
              </label>
              <div class="layer-width-control" aria-label="鉄道の太さ">
                <button type="button" data-lw="railway" data-op="dec" aria-label="鉄道を細く">−</button>
                <span class="value" data-lw-value="railway">1.00×</span>
                <button type="button" data-lw="railway" data-op="inc" aria-label="鉄道を太く">＋</button>
              </div>
            </div>
            <div class="layer-visibility-row">
              <label class="layer-visibility-toggle-label">
                <input type="checkbox" data-layer-visibility="building" checked />
                <span>建物</span>
              </label>
              <div class="layer-width-control" aria-label="建物の輪郭線の太さ">
                <button type="button" data-lw="building" data-op="dec" aria-label="建物の輪郭線を細く">−</button>
                <span class="value" data-lw-value="building">1.00×</span>
                <button type="button" data-lw="building" data-op="inc" aria-label="建物の輪郭線を太く">＋</button>
              </div>
            </div>
            <div class="layer-visibility-row">
              <label class="layer-visibility-toggle-label">
                <input type="checkbox" data-layer-visibility="boundary" checked />
                <span>行政界</span>
              </label>
              <div class="layer-width-control" aria-label="行政界の太さ">
                <button type="button" data-lw="boundary" data-op="dec" aria-label="行政界を細く">−</button>
                <span class="value" data-lw-value="boundary">1.00×</span>
                <button type="button" data-lw="boundary" data-op="inc" aria-label="行政界を太く">＋</button>
              </div>
            </div>
            <button type="button" class="reset" id="line-width-reset">太さを初期値に戻す</button>
          </div>
        </div>
        <button id="export-png" class="primary" type="button">PNG書き出し</button>
      </header>
      <div id="map"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
