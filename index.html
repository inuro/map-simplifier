<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>map-simplifier</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
      }
      #app {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        border-bottom: 1px solid #e0e0e0;
        background: #fff;
      }
      header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      header .spacer {
        flex: 1;
      }
      button.primary {
        appearance: none;
        border: 1px solid #888;
        background: #fff;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        border-radius: 4px;
      }
      button.primary:hover {
        background: #f3f3f3;
      }
      button.primary:disabled {
        opacity: 0.5;
        cursor: wait;
      }
      #map {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>map-simplifier</h1>
        <span class="spacer"></span>
        <button id="export-png" class="primary" type="button">PNG書き出し</button>
      </header>
      <div id="map"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
