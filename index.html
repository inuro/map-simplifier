<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>map-simplifier</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
      }
      #app {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        border-bottom: 1px solid #e0e0e0;
        background: #fff;
      }
      header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      header .spacer {
        flex: 1;
      }
      .selection-count {
        font-size: 12px;
        color: #666;
        min-width: 6em;
        text-align: right;
      }
      button.primary {
        appearance: none;
        border: 1px solid #888;
        background: #fff;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        border-radius: 4px;
      }
      button.primary:hover {
        background: #f3f3f3;
      }
      button.primary:disabled {
        opacity: 0.5;
        cursor: wait;
      }
      .preset-group {
        display: inline-flex;
        border: 1px solid #888;
        border-radius: 4px;
        overflow: hidden;
      }
      .preset-group button {
        appearance: none;
        border: 0;
        background: #fff;
        padding: 6px 10px;
        font-size: 13px;
        cursor: pointer;
      }
      .preset-group button + button {
        border-left: 1px solid #ccc;
      }
      .preset-group button:hover {
        background: #f3f3f3;
      }
      .preset-group button[aria-pressed="true"] {
        background: #333;
        color: #fff;
      }
      .preset-group button[aria-pressed="true"]:hover {
        background: #222;
      }
      .edit-group {
        display: inline-flex;
        gap: 6px;
      }
      .line-width-wrap {
        position: relative;
      }
      .line-width-popover {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        background: #fff;
        border: 1px solid #bbb;
        border-radius: 6px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        padding: 10px 12px;
        z-index: 10;
        font-size: 13px;
        min-width: 220px;
      }
      .line-width-popover[hidden] {
        display: none;
      }
      .line-width-row {
        display: grid;
        grid-template-columns: 3em 1fr 3.2em 1fr;
        align-items: center;
        gap: 6px;
        padding: 4px 0;
      }
      .line-width-row > .label {
        color: #444;
      }
      .line-width-row > .value {
        text-align: center;
        color: #666;
        font-variant-numeric: tabular-nums;
      }
      .line-width-row button {
        appearance: none;
        border: 1px solid #aaa;
        background: #fff;
        border-radius: 4px;
        padding: 2px 0;
        cursor: pointer;
        font-size: 14px;
      }
      .line-width-row button:hover {
        background: #f3f3f3;
      }
      .line-width-row button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .line-width-popover .reset {
        width: 100%;
        margin-top: 6px;
        padding: 4px 8px;
        border: 1px solid #aaa;
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      .line-width-popover .reset:hover {
        background: #f3f3f3;
      }
      #map {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>map-simplifier</h1>
        <span id="selection-count" class="selection-count" aria-live="polite"></span>
        <span class="spacer"></span>
        <div class="preset-group" role="group" aria-label="スタイルプリセット">
          <button id="preset-standard" type="button" aria-pressed="true">標準</button>
          <button id="preset-mono" type="button" aria-pressed="false">モノトーン</button>
        </div>
        <div class="edit-group" role="group" aria-label="編集アクション">
          <button id="undo" class="primary" type="button" title="戻す (⌘Z)" disabled>戻す</button>
          <button id="redo" class="primary" type="button" title="やり直す (⇧⌘Z)" disabled>やり直す</button>
          <button id="highlight" class="primary" type="button" title="選択中を強調／解除" disabled>強調</button>
          <button id="delete" class="primary" type="button" title="選択中を削除 (Delete)" disabled>削除</button>
          <button id="reset-edits" class="primary" type="button" title="編集を全て破棄" disabled>
            編集をリセット
          </button>
        </div>
        <div class="line-width-wrap">
          <button id="line-width-toggle" class="primary" type="button" aria-expanded="false" aria-controls="line-width-popover">太さ…</button>
          <div id="line-width-popover" class="line-width-popover" role="dialog" aria-label="ライン幅調整" hidden>
            <div class="line-width-row">
              <span class="label">道路</span>
              <button type="button" data-lw="road" data-op="dec" aria-label="道路を細く">−</button>
              <span class="value" data-lw-value="road">1.00×</span>
              <button type="button" data-lw="road" data-op="inc" aria-label="道路を太く">＋</button>
            </div>
            <div class="line-width-row">
              <span class="label">鉄道</span>
              <button type="button" data-lw="railway" data-op="dec" aria-label="鉄道を細く">−</button>
              <span class="value" data-lw-value="railway">1.00×</span>
              <button type="button" data-lw="railway" data-op="inc" aria-label="鉄道を太く">＋</button>
            </div>
            <div class="line-width-row">
              <span class="label">河川</span>
              <button type="button" data-lw="river" data-op="dec" aria-label="河川を細く">−</button>
              <span class="value" data-lw-value="river">1.00×</span>
              <button type="button" data-lw="river" data-op="inc" aria-label="河川を太く">＋</button>
            </div>
            <div class="line-width-row">
              <span class="label">境界</span>
              <button type="button" data-lw="boundary" data-op="dec" aria-label="境界を細く">−</button>
              <span class="value" data-lw-value="boundary">1.00×</span>
              <button type="button" data-lw="boundary" data-op="inc" aria-label="境界を太く">＋</button>
            </div>
            <button type="button" class="reset" id="line-width-reset">すべて初期値に戻す</button>
          </div>
        </div>
        <button id="export-png" class="primary" type="button">PNG書き出し</button>
      </header>
      <div id="map"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
